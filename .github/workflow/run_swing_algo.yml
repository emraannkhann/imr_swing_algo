name: IMR Swing Momentum Bot Daily Run

on:
  schedule:
    # Runs at 03:50 UTC (9:20 AM IST) every Monday through Friday
    - cron: '50 3 * * 1-5'
  workflow_dispatch: # Allows manual triggers from the UI Actions tab

jobs:
  run-algo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install All Python Dependencies Directly
      run: |
        python -m pip install --upgrade pip
        pip install playwright yfinance pandas requests beautifulsoup4 google-api-python-client google-auth

    - name: Install Playwright Chromium Browser and Auto-Detect OS System Dependencies
      run: |
        # --with-deps forces Playwright to auto-install libasound2t64 or libasound2 based on the OS version
        npx playwright install chromium --with-deps

    - name: Decrypt or Create Configuration Files
      run: |
        mkdir -p imr_resources
        echo '${{ secrets.ORB_GSHEET_KEYS }}' > imr_resources/orb_gsheet_keys.json
        echo '${{ secrets.IMR_UPSTOX_CREDS }}' > imr_resources/imr_upstox_creds.json

    - name: Execute Swing Strategy Core
      run: |
        python fortune_swing_list.py