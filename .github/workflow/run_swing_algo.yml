name: IMR Swing Momentum Bot Daily Run

on:
  schedule:
    # Runs at 03:50 UTC (9:20 AM IST) every Monday through Friday
    - cron: '50 3 * * 1-5'
  workflow_dispatch: # Allows manual triggers from the UI Actions tab

jobs:
  run-algo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automated caching cuts download times significantly

    - name: Install System Dependencies for Playwright
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

    - name: Install Python Requirements from File
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium

    - name: Decrypt or Create Configuration Files
      run: |
        # Recreate directory layout structure
        mkdir -p imr_resources
        
        # Inject Google Sheets & Upstox credentials securely from GitHub Secrets
        echo '${{ secrets.ORB_GSHEET_KEYS }}' > imr_resources/orb_gsheet_keys.json
        echo '${{ secrets.IMR_UPSTOX_CREDS }}' > imr_resources/imr_upstox_creds.json

    - name: Execute Swing Strategy Core
      run: |
        python fortune_swing_list.py